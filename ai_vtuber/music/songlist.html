<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: "Microsoft YaHei", sans-serif;
    padding: 10px;
    width: 300px;
    zoom: 1.5;
  }

  /* 整体容器 */
  .container {
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 16px;
    padding: 14px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  }

  /* 标题栏 */
  .title {
    color: white;
    font-size: 14px;
    font-weight: bold;
    text-align: center;
    letter-spacing: 2px;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
  }

  /* 未找到提示 */
  #not-found {
    display: none;
    background: rgba(255, 80, 80, 0.3);
    border: 1px solid rgba(255, 80, 80, 0.5);
    border-radius: 8px;
    padding: 8px 12px;
    color: #ffaaaa;
    font-size: 13px;
    text-align: center;
    margin-bottom: 10px;
  }

  /* 正在播放 */
  #now-playing {
    display: none;
    background: rgba(30, 215, 96, 0.15);
    border: 1px solid rgba(30, 215, 96, 0.4);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 10px;
  }

  .now-label {
    font-size: 11px;
    color: #1ED760;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .now-song {
    font-size: 16px;
    font-weight: bold;
    color: white;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .now-artist {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 2px;
  }

  .now-requester {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
  }

  /* 队列标题 */
  .queue-label {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  /* 队列项 */
  .queue-item {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 8px 10px;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .queue-index {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    min-width: 16px;
    text-align: center;
  }

  .queue-info {
    flex: 1;
    overflow: hidden;
  }

  .queue-song {
    font-size: 13px;
    color: white;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .queue-artist {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
  }

  .queue-requester {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    white-space: nowrap;
  }

  /* 空队列提示 */
  .empty {
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 12px;
    padding: 10px 0;
  }
</style>
</head>
<body>
<div class="container">
  <div class="title">🎵 点歌列表</div>

  <div id="not-found"></div>

  <div id="now-playing">
    <div class="now-label">▶ 正在播放</div>
    <div class="now-song" id="np-song"></div>
    <div class="now-artist" id="np-artist"></div>
    <div class="now-requester" id="np-requester"></div>
  </div>

  <div class="queue-label">等待队列</div>
  <div id="queue-list"><div class="empty">暂无歌曲</div></div>
</div>

<script>
async function refresh() {
  try {
    const res = await fetch('http://localhost:8889/status')
    const data = await res.json()

    // 未找到提示
    const nf = document.getElementById('not-found')
    if (data.not_found) {
      nf.style.display = 'block'
      nf.textContent = data.not_found
      setTimeout(() => { nf.style.display = 'none' }, 5000)
    }

    // 正在播放
    const np = document.getElementById('now-playing')
    if (data.now_playing) {
      np.style.display = 'block'
      document.getElementById('np-song').textContent = data.now_playing.song_name
      document.getElementById('np-artist').textContent = data.now_playing.artist
      document.getElementById('np-requester').textContent = data.now_playing.requester + ' 点的'
    } else {
      np.style.display = 'none'
    }

    // 队列，最多显示6首
    const list = document.getElementById('queue-list')
    const displayQueue = data.queue.slice(0, 6)
    if (displayQueue.length === 0) {
      list.innerHTML = '<div class="empty">暂无歌曲</div>'
    } else {
      list.innerHTML = ''
      displayQueue.forEach((item, i) => {
        const div = document.createElement('div')
        div.className = 'queue-item'
        div.innerHTML = `
          <div class="queue-index">${i + 1}</div>
          <div class="queue-info">
            <div class="queue-song">${item.song_name}</div>
            <div class="queue-artist">${item.artist}</div>
          </div>
          <div class="queue-requester">${item.requester}</div>
        `
        list.appendChild(div)
      })
      if (data.queue.length > 6) {
        const more = document.createElement('div')
        more.className = 'empty'
        more.textContent = `还有 ${data.queue.length - 6} 首...`
        list.appendChild(more)
      }
    }
  } catch(e) {
    // 服务未启动时不报错
  }
}

setInterval(refresh, 2000)
refresh()
</script>
</body>
</html>
